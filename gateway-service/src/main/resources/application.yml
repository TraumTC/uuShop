server:
  port: 8086

spring:
  application:
    name: gateway-service
  cloud:
#    nacos:
#      discovery:
#        server-addr: localhost:8848
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                          allowed-origins:
                            - "http://localhost:8383"
                            - "http://localhost:8282"
                          allowed-headers: "*"
                          allowed-methods: "*"
                          max-age: 3600
          discovery:
            locator:
              enabled: true

