server:
  port: 8086

spring:
  application:
    name: gateway-service
  cloud:
#    nacos:
#      discovery:
#        server-addr: localhost:8848
    gateway:
      server:
        webflux:
          # 服务发现（自动拉取服务列表）
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true  # 推荐加上，服务名转小写
          # 全局跨域配置
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:5175"
                  - "http://localhost:5176"
                allowed-methods: "*"
                allowed-headers: "*"
                allow-credentials: true  # 允许携带Cookie/Token
                max-age: 3600

